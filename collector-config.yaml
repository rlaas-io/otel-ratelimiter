# Minimal Collector configuration for testing the custom distribution.
# Used by the Dockerfile and for local testing with:
#   ./otelcol-ratelimiter/otelcol-ratelimiter --config collector-config.yaml

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  ratelimiter:
    policy_file: /etc/otel/policies.json
    fail_open: true
    cache_ttl: 30s
    key_prefix: otel
    environment: production

  batch:
    timeout: 5s
    send_batch_size: 1000

exporters:
  debug:
    verbosity: detailed

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [ratelimiter, batch]
      exporters: [debug]
    metrics:
      receivers: [otlp]
      processors: [ratelimiter, batch]
      exporters: [debug]
    logs:
      receivers: [otlp]
      processors: [ratelimiter, batch]
      exporters: [debug]
